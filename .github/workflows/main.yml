name: Win7-Docker-10Min
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Cài đặt Docker và Cloudflared
        run: |
          sudo apt-get update
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: 2. Chạy Windows 7 qua Docker
        run: |
          # Sử dụng image Windows 7 chạy trên Docker (KVM enabled)
          # Port 8006 là giao diện web noVNC mặc định của image này
          docker run -d --name windows_7 --device=/dev/kvm --cap-add NET_ADMIN -p 8006:8006 -e VERSION=win7 dockurr/windows
          
          echo "Đang khởi tạo Windows (có thể mất 1-2 phút)..."

      - name: 3. Mở Port qua Cloudflare
        run: |
          # Forward port 8006 ra ngoài web
          cloudflared tunnel --url http://localhost:8006 &
          
          echo "Đợi 30 giây để lấy Link..."
          sleep 30
          echo "----------------------------------------------------"
          echo "HÃY TÌM LINK .trycloudflare.com Ở DƯỚI ĐÂY:"
          echo "----------------------------------------------------"

      - name: 4. Treo máy 10 phút
        run: |
          # Giữ workflow chạy trong 600 giây
          sleep 400
